<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | SentinelMind</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {"outline-variant": "#c3c6d7", "inverse-primary": "#b4c5ff", "surface-dim": "#d9d9e5", "on-tertiary": "#ffffff", "surface-variant": "#e1e2ed", "on-primary": "#ffffff", "primary-fixed": "#dbe1ff", "on-background": "#191b23", "secondary-fixed-dim": "#b3c5ff", error: "#ba1a1a", "surface-container": "#ededf9", "primary-container": "#2563eb", "surface-tint": "#0053db", secondary: "#445c9d", "on-tertiary-container": "#ffede6", "on-error": "#ffffff", "inverse-surface": "#2e3039", "on-tertiary-fixed": "#360f00", "surface-container-highest": "#e1e2ed", "surface-container-high": "#e7e7f3", "on-surface-variant": "#434655", surface: "#faf8ff", primary: "#004ac6", "inverse-on-surface": "#f0f0fb", "on-primary-container": "#eeefff", "on-secondary": "#ffffff", "tertiary-fixed": "#ffdbcd", "tertiary-container": "#bc4800", "surface-container-low": "#f3f3fe", "secondary-fixed": "#dbe1ff", "on-primary-fixed-variant": "#003ea8", "on-error-container": "#93000a", tertiary: "#943700", background: "#faf8ff", "surface-bright": "#faf8ff", "error-container": "#ffdad6", "on-surface": "#191b23", "on-secondary-fixed-variant": "#2b4384", "surface-container-lowest": "#ffffff", "secondary-container": "#9fb7ff", "tertiary-fixed-dim": "#ffb596", "primary-fixed-dim": "#b4c5ff", outline: "#737686", "on-secondary-fixed": "#00184a", "on-secondary-container": "#2d4686", "on-primary-fixed": "#00174b", "on-tertiary-fixed-variant": "#7d2d00"}, borderRadius: {DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"}, fontFamily: {"data-mono": ["Geist Mono"], "body-prose": ["Inter"], "ui-header": ["Inter"], "data-terminal": ["Geist Mono"], "ui-label-bold": ["Inter"], "display-brand": ["Inter"], "body-medium": ["Inter"]}, fontSize: {"body-prose": ["15px", {lineHeight: "160%", fontWeight: "400"}], "data-terminal": ["12px", {lineHeight: "140%", fontWeight: "300"}], "display-brand": ["24px", {lineHeight: "120%", letterSpacing: "-0.02em", fontWeight: "800"}], "ui-label-bold": ["12px", {lineHeight: "100%", letterSpacing: "0.05em", fontWeight: "600"}], "data-mono": ["13px", {lineHeight: "150%", fontWeight: "400"}], "ui-header": ["18px", {lineHeight: "140%", fontWeight: "700"}], "body-medium": ["15px", {lineHeight: "160%", fontWeight: "500"}]}, spacing: {gutter: "16px", sidebar_left: "280px", unit: "4px", sidebar_right: "320px", margin: "24px"}}}};</script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hex-bg {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l25.98 15v30L30 60 4.02 45V15z' fill-opacity='0.05' fill='%23ffffff' fill-rule='evenodd'/%3E%3C/svg%3E");
        }
        .pulse-ring {
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            position: absolute;
            animation: pulse-out 3s infinite ease-out;
        }
        @keyframes pulse-out {
            0% { transform: scale(0.1); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }
        .shimmer-border:hover {
            border-color: transparent;
            background-image: linear-gradient(white, white), linear-gradient(45deg, #2563EB, #60A5FA, #2563EB);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.1);
        }
    </style>
</head>
<body class="bg-surface-container-low font-body-prose overflow-hidden h-screen flex">
<!-- LEFT HALF: TACTICAL VISUALIZATION (60vw) -->
<div class="hidden lg:flex w-[60vw] h-full bg-gradient-to-br from-[#0D1B2E] to-[#1A2E50] relative overflow-hidden items-center justify-center border-r border-slate-800">
<!-- Hex Grid Overlay -->
<div class="absolute inset-0 hex-bg opacity-30"></div>
<!-- Large Background Watermark -->
<div class="absolute flex items-center justify-center opacity-[0.12] pointer-events-none">
<svg class="w-[800px] h-[800px] text-white" fill="currentColor" viewbox="0 0 100 100">
<path d="M50 0L93.3 25V75L50 100L6.7 75V25L50 0Z"></path>
</svg>
</div>
<!-- Tactical Map Elements -->
<div class="relative w-full h-full p-24">
<!-- Mock Route Lines (SVG) -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" viewbox="0 0 1000 1000">
<path class="opacity-30" d="M200 300 Q 400 250 600 450 T 800 600" fill="none" stroke="white" stroke-dasharray="8,8" stroke-width="1.5"></path>
<path class="opacity-20" d="M150 700 Q 450 650 500 200" fill="none" stroke="white" stroke-dasharray="4,4" stroke-width="1"></path>
<path class="opacity-25" d="M700 100 Q 800 400 300 800" fill="none" stroke="white" stroke-dasharray="6,6" stroke-width="1.2"></path>
</svg>
<!-- Incident Markers (Animated) -->
<div class="absolute top-[30%] left-[20%]">
<div class="w-3 h-3 bg-white rounded-full relative">
<div class="pulse-ring w-12 h-12 -top-4 -left-4"></div>
<div class="pulse-ring w-12 h-12 -top-4 -left-4" style="animation-delay: 1s"></div>
</div>
</div>
<div class="absolute top-[45%] left-[60%]">
<div class="w-3 h-3 bg-white rounded-full relative">
<div class="pulse-ring w-16 h-16 -top-6 -left-6"></div>
<div class="pulse-ring w-16 h-16 -top-6 -left-6" style="animation-delay: 1.5s"></div>
</div>
</div>
<div class="absolute bottom-[20%] left-[30%]">
<div class="w-2 h-2 bg-blue-400 rounded-full relative">
<div class="pulse-ring w-10 h-10 -top-4 -left-4 opacity-50 border-blue-400"></div>
</div>
</div>
<!-- Brand Lockup (Bottom Left) -->
<div class="absolute bottom-12 left-12 flex flex-col gap-2">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-white flex items-center justify-center rounded-lg" style="clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);">
<span class="material-symbols-outlined text-primary text-2xl" data-weight="fill">shield_with_heart</span>
</div>
<span class="font-display-brand text-display-brand text-white tracking-widest uppercase">SENTINELMIND</span>
</div>
<p class="text-slate-400 font-body-prose text-body-prose ml-[52px]">Orchestrating calm from chaos</p>
</div>
</div>
</div>
<!-- RIGHT HALF: AUTHENTICATION CANVAS (40vw) -->
<div class="w-full lg:w-[40vw] h-full bg-[#EEF2F7] flex items-center justify-center p-8">
<div class="w-full max-w-[440px] bg-white rounded-xl shadow-lg border border-[#DDE3EE] p-10 transition-all duration-300 shimmer-border border-2">
<!-- Header -->
<div class="flex flex-col items-center mb-8">
<div class="w-14 h-14 bg-primary text-white flex items-center justify-center mb-4" style="clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);">
<span class="material-symbols-outlined text-3xl" data-weight="fill">hub</span>
</div>
<h1 class="font-display-brand text-display-brand text-on-surface">SENTINELMIND</h1>
</div>
<!-- Tab Switcher -->
<div class="flex p-1 bg-surface-container rounded-full mb-8">
<button class="flex-1 py-2 px-4 rounded-full bg-primary-container text-on-primary-container font-ui-label-bold text-ui-label-bold transition-all">
                    SIGN IN
                </button>
<button class="flex-1 py-2 px-4 rounded-full text-outline font-ui-label-bold text-ui-label-bold hover:text-on-surface transition-all">
                    CREATE ACCOUNT
                </button>
</div>
<!-- Form -->
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="font-ui-label-bold text-[9px] text-outline tracking-widest flex items-center gap-2">
<span class="material-symbols-outlined text-[14px]">mail</span>
                        EMAIL ADDRESS
                    </label>
<div class="relative group">
<input class="w-full h-12 bg-surface-container-low border border-[#DDE3EE] rounded-lg px-4 font-data-mono text-data-mono focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-outline-variant" placeholder="name@organization.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<label class="font-ui-label-bold text-[9px] text-outline tracking-widest flex items-center gap-2">
<span class="material-symbols-outlined text-[14px]">lock</span>
                        PASSWORD
                    </label>
<div class="relative group">
<input class="w-full h-12 bg-surface-container-low border border-[#DDE3EE] rounded-lg px-4 font-data-mono text-data-mono focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-outline-variant" placeholder="••••••••••••" type="password"/>
</div>
</div>
<!-- Extras -->
<div class="flex items-center justify-between">
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative">
<input class="sr-only peer" type="checkbox"/>
<div class="w-10 h-5 bg-surface-container rounded-full peer-checked:bg-primary-container transition-all"></div>
<div class="absolute top-1 left-1 w-3 h-3 bg-white rounded-full transition-all peer-checked:translate-x-5"></div>
</div>
<span class="font-body-medium text-[13px] text-on-surface-variant group-hover:text-on-surface">Remember this device</span>
</label>
<a class="font-body-medium text-[13px] text-outline hover:text-primary transition-colors" href="#">Forgot password?</a>
</div>
<!-- Primary Action -->
<button class="w-full h-14 bg-primary-container text-white font-ui-header text-ui-header rounded-xl shadow-md hover:shadow-lg hover:bg-primary active:scale-[0.98] transition-all flex items-center justify-center gap-3" type="submit">
                    ACCESS COMMAND CENTER
                    <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</form>
<!-- Footer Meta -->
<div class="mt-8 pt-6 border-t border-surface-container-high flex flex-col items-center gap-4">
<p class="text-[12px] text-outline text-center">
                    Authorized personnel only. All access and activities are logged in the 
                    <span class="font-data-mono text-[11px] text-on-surface-variant">SEC_OPS_LOGGER</span>.
                </p>
<div class="flex gap-4">
<span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
<span class="font-data-mono text-[10px] text-outline-variant uppercase tracking-tighter">System Health: Nominal</span>
</div>
</div>
</div>
</div>
</body></html>
