<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">tailwind.config = {darkMode: "class", theme: {extend: {colors: {"outline-variant": "#c3c6d7", "inverse-primary": "#b4c5ff", "surface-dim": "#d9d9e5", "on-tertiary": "#ffffff", "surface-variant": "#e1e2ed", "on-primary": "#ffffff", "primary-fixed": "#dbe1ff", "on-background": "#191b23", "secondary-fixed-dim": "#b3c5ff", error: "#ba1a1a", "surface-container": "#ededf9", "primary-container": "#2563eb", "surface-tint": "#0053db", secondary: "#445c9d", "on-tertiary-container": "#ffede6", "on-error": "#ffffff", "inverse-surface": "#2e3039", "on-tertiary-fixed": "#360f00", "surface-container-highest": "#e1e2ed", "surface-container-high": "#e7e7f3", "on-surface-variant": "#434655", surface: "#faf8ff", primary: "#004ac6", "inverse-on-surface": "#f0f0fb", "on-primary-container": "#eeefff", "on-secondary": "#ffffff", "tertiary-fixed": "#ffdbcd", "tertiary-container": "#bc4800", "surface-container-low": "#f3f3fe", "secondary-fixed": "#dbe1ff", "on-primary-fixed-variant": "#003ea8", "on-error-container": "#93000a", tertiary: "#943700", background: "#faf8ff", "surface-bright": "#faf8ff", "error-container": "#ffdad6", "on-surface": "#191b23", "on-secondary-fixed-variant": "#2b4384", "surface-container-lowest": "#ffffff", "secondary-container": "#9fb7ff", "tertiary-fixed-dim": "#ffb596", "primary-fixed-dim": "#b4c5ff", outline: "#737686", "on-secondary-fixed": "#00184a", "on-secondary-container": "#2d4686", "on-primary-fixed": "#00174b", "on-tertiary-fixed-variant": "#7d2d00"}, borderRadius: {DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px"}, fontFamily: {"data-mono": ["Geist Mono"], "body-prose": ["Inter"], "ui-header": ["Inter"], "data-terminal": ["Geist Mono"], "ui-label-bold": ["Inter"], "display-brand": ["Inter"], "body-medium": ["Inter"]}, fontSize: {"body-prose": ["15px", {lineHeight: "160%", fontWeight: "400"}], "data-terminal": ["12px", {lineHeight: "140%", fontWeight: "300"}], "display-brand": ["24px", {lineHeight: "120%", letterSpacing: "-0.02em", fontWeight: "800"}], "ui-label-bold": ["12px", {lineHeight: "100%", letterSpacing: "0.05em", fontWeight: "600"}], "data-mono": ["13px", {lineHeight: "150%", fontWeight: "400"}], "ui-header": ["18px", {lineHeight: "140%", fontWeight: "700"}], "body-medium": ["15px", {lineHeight: "160%", fontWeight: "500"}]}, spacing: {gutter: "16px", sidebar_left: "280px", unit: "4px", sidebar_right: "320px", margin: "24px"}}}};</script>
<style>
        .hex-grid {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='104' viewBox='0 0 60 104' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l30 17.32v34.64L30 69.28 0 51.96V17.32L30 0z' fill-opacity='0.05' fill='%23ffffff' fill-rule='evenodd'/%3E%3C/svg%3E");
        }
        .pulse-marker {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #2563eb;
            border-radius: 50%;
        }
        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border: 2px solid #2563eb;
            border-radius: 50%;
            opacity: 0.8;
            animation: pulse-animation 3s infinite ease-out;
        }
        @keyframes pulse-animation {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(4); opacity: 0; }
        }
        .shimmer-border:hover {
            border-color: transparent;
            background-image: linear-gradient(white, white), linear-gradient(90deg, #2563eb, #60a5fa, #2563eb);
            background-origin: border-box;
            background-clip: content-box, border-box;
        }
    </style>
</head>
<body class="bg-surface-container-lowest min-h-screen flex overflow-hidden">
<!-- Left Half: Tactical Map Section (60vw) -->
<section class="w-[60vw] relative bg-gradient-to-br from-[#0D1B2E] to-[#1A2E50] hidden lg:flex flex-col justify-between p-12 overflow-hidden border-r border-slate-800">
<!-- Hex Grid Overlay -->
<div class="absolute inset-0 hex-grid opacity-30"></div>
<!-- Massive Watermark Hexagon -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] opacity-[0.08]">
<svg class="w-full h-full fill-white" viewbox="0 0 100 115">
<polygon points="50 0 100 28.87 100 86.6 50 115.47 0 86.6 0 28.87"></polygon>
</svg>
</div>
<!-- Tactical Map Elements (SVG Lines & Pulse Markers) -->
<div class="absolute inset-0">
<svg class="w-full h-full opacity-40">
<path d="M 200,200 L 450,350 L 700,150 L 900,450" fill="none" stroke="white" stroke-dasharray="8,8" stroke-width="1.5"></path>
<path d="M 100,600 L 300,550 L 500,750" fill="none" stroke="white" stroke-dasharray="8,8" stroke-width="1.5"></path>
</svg>
<div class="pulse-marker" style="top: 200px; left: 200px;"><div class="pulse-ring"></div><div class="pulse-ring" style="animation-delay: 1s"></div></div>
<div class="pulse-marker" style="top: 350px; left: 450px;"><div class="pulse-ring" style="animation-delay: 0.5s"></div></div>
<div class="pulse-marker" style="top: 150px; left: 700px;"><div class="pulse-ring" style="animation-delay: 1.5s"></div></div>
<div class="pulse-marker" style="top: 550px; left: 300px;"><div class="pulse-ring" style="animation-delay: 2s"></div></div>
</div>
<!-- Brand Footer -->
<div class="relative z-10 mt-auto flex items-center gap-4">
<div class="w-14 h-14 flex items-center justify-center bg-white/10 backdrop-blur-md rounded-xl border border-white/20">
<span class="material-symbols-outlined text-white text-4xl" data-icon="hexagon" data-weight="fill" style="font-variation-settings: 'FILL' 1;">hexagon</span>
</div>
<div>
<h1 class="font-display-brand text-white text-3xl tracking-tighter">SENTINELMIND</h1>
<p class="font-ui-label-bold text-blue-300 uppercase tracking-[0.2em] opacity-80">Orchestrating calm from chaos</p>
</div>
</div>
</section>
<!-- Right Half: Form Section (40vw) -->
<main class="w-full lg:w-[40vw] bg-[#EEF2F7] flex items-center justify-center p-6 md:p-12 overflow-y-auto">
<div class="w-full max-w-[480px]">
<!-- Responsive Mobile Logo -->
<div class="lg:hidden flex flex-col items-center mb-8">
<span class="material-symbols-outlined text-primary text-5xl mb-2" data-icon="hexagon" data-weight="fill" style="font-variation-settings: 'FILL' 1;">hexagon</span>
<h1 class="font-display-brand text-on-background text-2xl">SENTINELMIND</h1>
</div>
<div class="bg-white rounded-xl shadow-lg border border-outline-variant/30 p-8 shimmer-border transition-all duration-300">
<!-- Desktop Header -->
<div class="hidden lg:flex items-center gap-3 mb-10">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="hexagon" data-weight="fill" style="font-variation-settings: 'FILL' 1;">hexagon</span>
<h2 class="font-display-brand text-on-background text-xl">SENTINELMIND</h2>
</div>
<!-- Tab Switcher -->
<div class="flex p-1 bg-surface-container-low rounded-lg mb-8">
<button class="flex-1 py-2 text-center font-ui-label-bold text-slate-500 rounded-lg hover:bg-white/50 transition-all">Sign In</button>
<button class="flex-1 py-2 text-center font-ui-label-bold bg-primary-container text-white rounded-lg shadow-sm">Create Account</button>
</div>
<form class="space-y-5">
<!-- Full Name -->
<div>
<label class="block font-ui-label-bold text-on-surface-variant mb-1.5 ml-1">Full Name</label>
<input class="w-full h-11 bg-[#F6F8FC] border border-outline-variant/30 rounded-lg px-4 font-data-mono text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="Commander Name" type="text"/>
</div>
<!-- Email -->
<div>
<label class="block font-ui-label-bold text-on-surface-variant mb-1.5 ml-1">Work Email</label>
<input class="w-full h-11 bg-[#F6F8FC] border border-outline-variant/30 rounded-lg px-4 font-data-mono text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="name@organization.gov" type="email"/>
</div>
<!-- Role Dropdown -->
<div>
<label class="block font-ui-label-bold text-on-surface-variant mb-1.5 ml-1">Operational Role</label>
<div class="relative">
<select class="w-full h-11 bg-[#F6F8FC] border border-outline-variant/30 rounded-lg px-4 font-data-mono text-on-surface appearance-none focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all cursor-pointer">
<option>Incident Commander</option>
<option>Field Coordinator</option>
<option>Analyst</option>
<option>Observer</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-2.5 pointer-events-none text-slate-400" data-icon="keyboard_arrow_down">keyboard_arrow_down</span>
</div>
</div>
<!-- Password Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div>
<label class="block font-ui-label-bold text-on-surface-variant mb-1.5 ml-1">Password</label>
<input class="w-full h-11 bg-[#F6F8FC] border border-outline-variant/30 rounded-lg px-4 font-data-mono text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="••••••••" type="password"/>
</div>
<div>
<label class="block font-ui-label-bold text-on-surface-variant mb-1.5 ml-1">Confirm</label>
<input class="w-full h-11 bg-[#F6F8FC] border border-outline-variant/30 rounded-lg px-4 font-data-mono text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-12 bg-primary-container text-white font-ui-header tracking-tight rounded-lg shadow-md hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-6" type="submit">
<span class="material-symbols-outlined text-xl" data-icon="how_to_reg">how_to_reg</span>
                        REQUEST ACCESS
                    </button>
</form>
<!-- Status Note -->
<div class="mt-8 p-4 bg-[#FFF8E6] border border-[#FFD97A] rounded-lg flex items-start gap-3">
<span class="material-symbols-outlined text-tertiary mt-0.5" data-icon="shield_person">shield_person</span>
<p class="font-ui-label-bold text-tertiary-fixed-variant leading-tight">
                        Access requires admin approval. Credentials will be verified against organizational registry.
                    </p>
</div>
</div>
<!-- Global Footer -->
<div class="mt-8 flex justify-between items-center px-2">
<p class="font-data-terminal text-slate-400">SYSTEM_AUTH_V2.0.4</p>
<div class="flex gap-4">
<a class="font-data-terminal text-slate-500 hover:text-primary transition-colors" href="#">HELP</a>
<a class="font-data-terminal text-slate-500 hover:text-primary transition-colors" href="#">SECURITY</a>
</div>
</div>
</div>
</main>
</body></html>
